name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  merge_group:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Disable incremental compilation for CI builds
  CARGO_INCREMENTAL: 0
  # Emit full backtraces
  RUST_BACKTRACE: full

jobs:
  # Fast path: Quick checks that fail fast
  quick-checks:
    name: Quick Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (fast check)
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Main build and test matrix
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.rust }})
    needs: quick-checks
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
        include:
          # Add nightly on Ubuntu only
          - os: ubuntu-latest
            rust: nightly
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}
          cache-on-failure: true

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config openssl

      - name: Build workspace
        run: cargo build --workspace --all-targets --verbose

      - name: Run tests
        run: cargo test --workspace --all-targets --verbose

      - name: Run doc tests
        run: cargo test --workspace --doc --verbose

  # Test with ONNX feature enabled
  test-onnx:
    name: Test with ONNX (${{ matrix.os }})
    needs: quick-checks
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-onnx
          cache-on-failure: true

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config openssl

      - name: Build with ONNX feature
        run: cargo build -p oximedia-cv --features onnx --verbose

      - name: Test with ONNX feature
        run: cargo test -p oximedia-cv --features onnx --verbose

  # Test without default features
  test-no-default-features:
    name: Test without default features
    needs: quick-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: no-default-features
          cache-on-failure: true

      - name: Build without default features
        run: |
          cargo build -p oximedia-core --no-default-features
          cargo build -p oximedia-io --no-default-features
          cargo build -p oximedia-codec --no-default-features
          cargo build -p oximedia-container --no-default-features
          cargo build -p oximedia-audio --no-default-features
          cargo build -p oximedia-graph --no-default-features
          cargo build -p oximedia-cv --no-default-features
          cargo build -p oximedia-net --no-default-features

  # Clippy with all feature combinations
  clippy:
    name: Clippy (all features)
    needs: quick-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

  # Check MSRV (Minimum Supported Rust Version)
  msrv:
    name: Check MSRV (1.75)
    needs: quick-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.75"

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv
          cache-on-failure: true

      - name: Check MSRV
        run: cargo check --workspace --all-targets

  # Documentation build check
  docs:
    name: Documentation
    needs: quick-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: docs
          cache-on-failure: true

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps --document-private-items

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Check for unused dependencies
  udeps:
    name: Check unused dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Check for unused dependencies
        run: cargo +nightly udeps --workspace

  # Final status check
  ci-success:
    name: CI Success
    needs:
      - quick-checks
      - test
      - test-onnx
      - test-no-default-features
      - clippy
      - msrv
      - docs
      - security-audit
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: exit 1
