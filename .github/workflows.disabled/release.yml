name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          # Extract changelog for this version
          VERSION="${{ steps.get_version.outputs.version }}"

          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi

          # Create changelog
          cat > CHANGELOG.md << EOF
          ## What's Changed

          $COMMITS

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${VERSION}
          EOF

          echo "Generated changelog"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') || contains(steps.get_version.outputs.version, 'rc') }}

  build-release:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: oximedia-cli
            asset_name: oximedia-linux-x86_64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: oximedia-cli
            asset_name: oximedia-linux-x86_64-musl

          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: oximedia-cli
            asset_name: oximedia-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: oximedia-cli
            asset_name: oximedia-macos-aarch64

          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: oximedia-cli.exe
            asset_name: oximedia-windows-x86_64.exe

          # Linux ARM
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: oximedia-cli
            asset_name: oximedia-linux-aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config musl-tools

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config openssl

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }} -p oximedia-cli --locked

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }} || true

      - name: Create archive
        id: archive
        shell: bash
        run: |
          ARCHIVE_DIR="oximedia-${{ needs.create-release.outputs.version }}-${{ matrix.target }}"
          mkdir -p "$ARCHIVE_DIR"

          # Copy binary
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} "$ARCHIVE_DIR/"

          # Copy documentation
          cp README.md "$ARCHIVE_DIR/" || true
          cp LICENSE "$ARCHIVE_DIR/" || true

          # Create archive
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$ARCHIVE_DIR.zip" "$ARCHIVE_DIR"
            echo "archive=$ARCHIVE_DIR.zip" >> $GITHUB_OUTPUT
          else
            tar czf "$ARCHIVE_DIR.tar.gz" "$ARCHIVE_DIR"
            echo "archive=$ARCHIVE_DIR.tar.gz" >> $GITHUB_OUTPUT
          fi

      - name: Calculate checksum
        id: checksum
        shell: bash
        run: |
          ARCHIVE="${{ steps.archive.outputs.archive }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            certutil -hashfile "$ARCHIVE" SHA256 > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi
          cat "$ARCHIVE.sha256"

      - name: Upload release archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.archive.outputs.archive }}
          asset_name: ${{ steps.archive.outputs.archive }}
          asset_content_type: application/octet-stream

      - name: Upload checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.archive.outputs.archive }}.sha256
          asset_name: ${{ steps.archive.outputs.archive }}.sha256
          asset_content_type: text/plain

  publish-crates:
    name: Publish to crates.io
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only publish on non-prerelease tags
    if: "!contains(needs.create-release.outputs.version, 'alpha') && !contains(needs.create-release.outputs.version, 'beta') && !contains(needs.create-release.outputs.version, 'rc')"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${{ needs.create-release.outputs.version }}"
          TAG_VERSION="${TAG_VERSION#v}"  # Remove 'v' prefix
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "oximedia") | .version')

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Publish crates in order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish in dependency order
          echo "Publishing oximedia-core..."
          cargo publish -p oximedia-core --locked

          echo "Waiting for oximedia-core to be available..."
          sleep 30

          echo "Publishing oximedia-io..."
          cargo publish -p oximedia-io --locked
          sleep 30

          echo "Publishing oximedia-codec..."
          cargo publish -p oximedia-codec --locked
          sleep 30

          echo "Publishing oximedia-container..."
          cargo publish -p oximedia-container --locked
          sleep 30

          echo "Publishing oximedia-audio..."
          cargo publish -p oximedia-audio --locked
          sleep 30

          echo "Publishing oximedia-graph..."
          cargo publish -p oximedia-graph --locked
          sleep 30

          echo "Publishing oximedia-cv..."
          cargo publish -p oximedia-cv --locked
          sleep 30

          echo "Publishing oximedia-net..."
          cargo publish -p oximedia-net --locked
          sleep 30

          echo "Publishing oximedia..."
          cargo publish -p oximedia --locked
          sleep 30

          echo "Publishing oximedia-cli..."
          cargo publish -p oximedia-cli --locked

          echo "All crates published successfully!"

  docker-release:
    name: Build and Push Docker Image
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/oximedia
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(needs.create-release.outputs.version, 'alpha') && !contains(needs.create-release.outputs.version, 'beta') && !contains(needs.create-release.outputs.version, 'rc') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
