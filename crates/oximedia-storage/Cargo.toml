[package]
name = "oximedia-storage"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Cloud storage abstraction for S3, Azure Blob, and Google Cloud Storage"
keywords = ["storage", "cloud", "s3", "multimedia", "media"]
categories = ["multimedia", "filesystem"]
readme = "README.md"
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
tokio = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
bytes = { workspace = true }
futures = "0.3"
tracing = { workspace = true }
url = "2.5"
chrono = { workspace = true }
sha2 = { workspace = true }
hex = "0.4"
lru = { workspace = true }
oxiarc-lz4 = { workspace = true }
oxiarc-zstd = { workspace = true }
memmap2 = { workspace = true, optional = true }

# AWS S3
aws-sdk-s3 = { workspace = true, optional = true }
aws-config = { workspace = true, optional = true }

# Azure Blob Storage
azure_storage = { workspace = true, optional = true }
azure_storage_blobs = { workspace = true, optional = true }
azure_core = { workspace = true, optional = true }

# Google Cloud Storage
google-cloud-storage = { workspace = true, optional = true }
google-cloud-wkt = { workspace = true, optional = true }
google-cloud-auth = { workspace = true, optional = true }

[dev-dependencies]
tempfile.workspace = true

[features]
default = []
s3 = ["aws-sdk-s3", "aws-config"]
azure = ["azure_storage", "azure_storage_blobs", "azure_core"]
gcs = ["google-cloud-storage", "google-cloud-wkt", "google-cloud-auth"]
minio = ["s3"]
mmap = ["memmap2"]
