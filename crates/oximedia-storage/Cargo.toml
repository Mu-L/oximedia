[package]
name = "oximedia-storage"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Cloud storage abstraction for S3, Azure Blob, and Google Cloud Storage"
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
tokio = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
bytes = { workspace = true }
futures = "0.3"
tracing = { workspace = true }
url = "2.5"
chrono = { workspace = true }
sha2 = { workspace = true }
hex = "0.4"
lru = "0.16"

# AWS S3
aws-sdk-s3 = { version = "1.126", optional = true, default-features = false, features = ["rustls", "rt-tokio"] }
aws-config = { version = "1.8", optional = true, default-features = false, features = ["rt-tokio", "credentials-process", "sso"] }

# Azure Blob Storage
azure_storage = { version = "0.21", optional = true }
azure_storage_blobs = { version = "0.21", optional = true }
azure_core = { version = "0.33", optional = true }

# Google Cloud Storage
google-cloud-storage = { version = "1.9", optional = true }
google-cloud-wkt = { version = "1", optional = true }
google-cloud-auth = { version = "1.7", default-features = false, optional = true }

[dev-dependencies]
tempfile.workspace = true

[features]
default = []
s3 = ["aws-sdk-s3", "aws-config"]
azure = ["azure_storage", "azure_storage_blobs", "azure_core"]
gcs = ["google-cloud-storage", "google-cloud-wkt", "google-cloud-auth"]
