[package]
name = "oximedia-storage"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Cloud storage abstraction for S3, Azure Blob, and Google Cloud Storage"
keywords = ["storage", "cloud", "s3", "multimedia", "media"]
categories = ["multimedia", "filesystem"]
readme = "README.md"
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
bytes = { workspace = true }
futures.workspace = true
tracing = { workspace = true }
url = { workspace = true }
chrono = { workspace = true }
sha2 = { workspace = true }
hex.workspace = true
lru = { workspace = true }
oxiarc-lz4 = { workspace = true }
oxiarc-zstd = { workspace = true }
memmap2 = { workspace = true, optional = true }

# AWS S3
aws-sdk-s3 = { workspace = true, optional = true }
aws-config = { workspace = true, optional = true }

# Azure Blob Storage — Pure-Rust REST client (Shared Key / HMAC-SHA256 auth),
# mirroring oximedia-cloud's src/azure/ module. The generated `azure_storage_blob`
# 1.0 SDK crate is intentionally NOT used: it only supports Microsoft Entra ID
# (OAuth2 token-credential) authentication, not the account-name/account-key
# shared-key model this crate's `UnifiedConfig` exposes. See src/azure.rs.
reqwest = { workspace = true, optional = true, features = ["stream"] }
hmac = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
rustls-rustcrypto = { workspace = true, optional = true }

# Google Cloud Storage
google-cloud-storage = { workspace = true, optional = true }
google-cloud-wkt = { workspace = true, optional = true }
google-cloud-auth = { workspace = true, optional = true }

[dev-dependencies]
tempfile.workspace = true

[features]
default = []
s3 = ["aws-sdk-s3", "aws-config"]
azure = ["dep:reqwest", "dep:hmac", "dep:base64", "dep:rustls-rustcrypto"]
gcs = ["google-cloud-storage", "google-cloud-wkt", "google-cloud-auth"]
minio = ["s3"]
mmap = ["memmap2"]
