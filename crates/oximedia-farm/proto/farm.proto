syntax = "proto3";

package oximedia.farm;

// Farm service for coordinator-worker communication
service FarmCoordinator {
  // Worker registration
  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);

  // Worker heartbeat
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Get next task for worker
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);

  // Report task progress
  rpc ReportProgress(ProgressReport) returns (ProgressResponse);

  // Report task completion
  rpc CompleteTask(TaskCompletion) returns (TaskCompletionResponse);

  // Report task failure
  rpc FailTask(TaskFailure) returns (TaskFailureResponse);

  // Worker deregistration
  rpc UnregisterWorker(UnregisterWorkerRequest) returns (UnregisterWorkerResponse);
}

// Job management service
service JobService {
  // Submit a new job
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);

  // Cancel a job
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);

  // Get job status
  rpc GetJobStatus(JobStatusRequest) returns (JobStatusResponse);

  // List jobs
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);

  // Get job logs
  rpc GetJobLogs(JobLogsRequest) returns (stream LogEntry);
}

// Monitoring service
service MonitoringService {
  // Get coordinator metrics
  rpc GetMetrics(MetricsRequest) returns (MetricsResponse);

  // Get worker status
  rpc GetWorkerStatus(WorkerStatusRequest) returns (WorkerStatusResponse);

  // List all workers
  rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse);

  // Get queue statistics
  rpc GetQueueStats(QueueStatsRequest) returns (QueueStatsResponse);
}

// Worker registration request
message RegisterWorkerRequest {
  string worker_id = 1;
  string hostname = 2;
  WorkerCapabilities capabilities = 3;
  map<string, string> metadata = 4;
}

message RegisterWorkerResponse {
  bool success = 1;
  string message = 2;
  int64 heartbeat_interval_secs = 3;
}

// Worker capabilities
message WorkerCapabilities {
  uint32 cpu_cores = 1;
  uint64 memory_bytes = 2;
  repeated string supported_codecs = 3;
  repeated string supported_formats = 4;
  bool has_gpu = 5;
  repeated GpuInfo gpus = 6;
  uint32 max_concurrent_tasks = 7;
  map<string, string> tags = 8;
}

message GpuInfo {
  string name = 1;
  uint64 memory_bytes = 2;
  string vendor = 3;
  repeated string supported_codecs = 4;
}

// Heartbeat messages
message HeartbeatRequest {
  string worker_id = 1;
  WorkerStatus status = 2;
  repeated string active_task_ids = 3;
}

message HeartbeatResponse {
  bool success = 1;
  repeated string tasks_to_cancel = 2;
  bool should_shutdown = 3;
}

message WorkerStatus {
  double cpu_usage = 1;
  uint64 memory_used = 2;
  uint64 memory_total = 3;
  uint64 disk_free = 4;
  uint32 active_tasks = 5;
  WorkerState state = 6;
}

enum WorkerState {
  IDLE = 0;
  BUSY = 1;
  OVERLOADED = 2;
  DRAINING = 3;
  OFFLINE = 4;
}

// Task retrieval
message GetTaskRequest {
  string worker_id = 1;
  uint32 max_tasks = 2;
}

message GetTaskResponse {
  repeated Task tasks = 1;
}

message Task {
  string task_id = 1;
  string job_id = 2;
  TaskType task_type = 3;
  bytes payload = 4;
  Priority priority = 5;
  int64 deadline = 6;
  map<string, string> metadata = 7;
}

enum TaskType {
  TASK_TRANSCODE = 0;
  TASK_THUMBNAIL = 1;
  TASK_QC = 2;
  TASK_ANALYSIS = 3;
  TASK_FINGERPRINT = 4;
  TASK_AUDIO_TRANSCODE = 5;
  TASK_SEGMENT_MERGE = 6;
}

enum Priority {
  LOW = 0;
  NORMAL = 1;
  HIGH = 2;
  CRITICAL = 3;
}

// Progress reporting
message ProgressReport {
  string worker_id = 1;
  string task_id = 2;
  double progress_percent = 3;
  string status_message = 4;
  map<string, string> metrics = 5;
  int64 timestamp = 6;
}

message ProgressResponse {
  bool success = 1;
}

// Task completion
message TaskCompletion {
  string worker_id = 1;
  string task_id = 2;
  bytes result = 3;
  int64 duration_ms = 4;
  map<string, string> metrics = 5;
}

message TaskCompletionResponse {
  bool success = 1;
  string message = 2;
}

// Task failure
message TaskFailure {
  string worker_id = 1;
  string task_id = 2;
  string error_message = 3;
  FailureType failure_type = 4;
  bool retryable = 5;
}

enum FailureType {
  TRANSIENT = 0;
  PERMANENT = 1;
  WORKER_ERROR = 2;
  RESOURCE_ERROR = 3;
  TIMEOUT = 4;
}

message TaskFailureResponse {
  bool success = 1;
}

// Worker deregistration
message UnregisterWorkerRequest {
  string worker_id = 1;
  string reason = 2;
}

message UnregisterWorkerResponse {
  bool success = 1;
}

// Job submission
message SubmitJobRequest {
  string job_id = 1;
  JobType job_type = 2;
  string input_path = 3;
  string output_path = 4;
  Priority priority = 5;
  bytes parameters = 6;
  repeated string dependencies = 7;
  int64 deadline = 8;
  map<string, string> metadata = 9;
}

enum JobType {
  JOB_VIDEO_TRANSCODE = 0;
  JOB_AUDIO_TRANSCODE = 1;
  JOB_THUMBNAIL_GEN = 2;
  JOB_QC_VALIDATION = 3;
  JOB_MEDIA_ANALYSIS = 4;
  JOB_CONTENT_FINGERPRINT = 5;
  JOB_MULTI_OUTPUT_TRANSCODE = 6;
}

message SubmitJobResponse {
  bool success = 1;
  string job_id = 2;
  string message = 3;
}

// Job cancellation
message CancelJobRequest {
  string job_id = 1;
  string reason = 2;
}

message CancelJobResponse {
  bool success = 1;
  string message = 2;
}

// Job status
message JobStatusRequest {
  string job_id = 1;
}

message JobStatusResponse {
  string job_id = 1;
  JobState state = 2;
  double progress = 3;
  string message = 4;
  int64 created_at = 5;
  int64 started_at = 6;
  int64 completed_at = 7;
  repeated TaskStatus tasks = 8;
  map<string, string> metadata = 9;
}

enum JobState {
  PENDING = 0;
  QUEUED = 1;
  RUNNING = 2;
  COMPLETED = 3;
  FAILED = 4;
  CANCELLED = 5;
  PAUSED = 6;
}

message TaskStatus {
  string task_id = 1;
  string worker_id = 2;
  TaskState state = 3;
  double progress = 4;
  string message = 5;
}

enum TaskState {
  TASK_PENDING = 0;
  TASK_ASSIGNED = 1;
  TASK_RUNNING = 2;
  TASK_COMPLETED = 3;
  TASK_FAILED = 4;
}

// Job listing
message ListJobsRequest {
  JobState state_filter = 1;
  uint32 limit = 2;
  uint32 offset = 3;
}

message ListJobsResponse {
  repeated JobInfo jobs = 1;
  uint32 total_count = 2;
}

message JobInfo {
  string job_id = 1;
  JobType job_type = 2;
  JobState state = 3;
  double progress = 4;
  Priority priority = 5;
  int64 created_at = 6;
}

// Job logs
message JobLogsRequest {
  string job_id = 1;
  LogLevel min_level = 2;
  int64 since_timestamp = 3;
}

enum LogLevel {
  DEBUG = 0;
  INFO = 1;
  WARN = 2;
  ERROR = 3;
}

message LogEntry {
  int64 timestamp = 1;
  LogLevel level = 2;
  string message = 3;
  string worker_id = 4;
  string task_id = 5;
  map<string, string> context = 6;
}

// Metrics
message MetricsRequest {
  // Empty for now
}

message MetricsResponse {
  CoordinatorMetrics coordinator = 1;
  repeated WorkerMetrics workers = 2;
  QueueMetrics queue = 3;
}

message CoordinatorMetrics {
  int64 uptime_seconds = 1;
  uint64 total_jobs_submitted = 2;
  uint64 total_jobs_completed = 3;
  uint64 total_jobs_failed = 4;
  uint32 active_workers = 5;
  double avg_job_duration_ms = 6;
  double jobs_per_hour = 7;
}

message WorkerMetrics {
  string worker_id = 1;
  WorkerState state = 2;
  uint32 tasks_completed = 3;
  uint32 tasks_failed = 4;
  double cpu_usage = 5;
  double memory_usage = 6;
  int64 last_heartbeat = 7;
}

message QueueMetrics {
  uint32 pending_jobs = 1;
  uint32 running_jobs = 2;
  uint32 pending_tasks = 3;
  uint32 running_tasks = 4;
  map<string, uint32> jobs_by_priority = 5;
  double avg_queue_time_ms = 6;
}

// Worker status
message WorkerStatusRequest {
  string worker_id = 1;
}

message WorkerStatusResponse {
  string worker_id = 1;
  WorkerState state = 2;
  WorkerCapabilities capabilities = 3;
  WorkerStatus status = 4;
  repeated TaskStatus active_tasks = 5;
  int64 registered_at = 6;
  int64 last_heartbeat = 7;
}

// List workers
message ListWorkersRequest {
  WorkerState state_filter = 1;
}

message ListWorkersResponse {
  repeated WorkerInfo workers = 1;
}

message WorkerInfo {
  string worker_id = 1;
  string hostname = 2;
  WorkerState state = 3;
  uint32 active_tasks = 4;
  uint32 max_tasks = 5;
  int64 last_heartbeat = 6;
}

// Queue statistics
message QueueStatsRequest {
  // Empty for now
}

message QueueStatsResponse {
  QueueMetrics metrics = 1;
  repeated PriorityQueueStats priority_queues = 2;
}

message PriorityQueueStats {
  Priority priority = 1;
  uint32 pending_count = 2;
  uint32 running_count = 3;
  double avg_wait_time_ms = 4;
}
