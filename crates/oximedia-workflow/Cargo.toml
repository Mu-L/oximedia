[package]
name = "oximedia-workflow"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Comprehensive workflow orchestration engine for OxiMedia"
keywords = ["workflow", "batch", "processing", "multimedia", "pipeline"]
categories = ["multimedia", "algorithms"]
readme = "README.md"

[lints]
workspace = true

[features]
default = []
sqlite = ["oxisql-core", "oxisql-sqlite-compat"]

[dependencies]
# Async runtime
async-trait = { workspace = true }
futures.workspace = true

# Error handling
thiserror = { workspace = true }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yaml = "0.9"

# Time and scheduling
chrono = { workspace = true, features = ["serde"] }
cron = "0.17"

# Logging and tracing
tracing = { workspace = true }

# UUID generation
uuid = { workspace = true }

# URL parsing
url = { workspace = true }

# Collections
indexmap = { workspace = true }
dashmap = { workspace = true }

# Concurrency
parking_lot = { workspace = true }

# CLI
clap = { workspace = true, features = ["derive"] }

# getrandom v0.2 (via cron -> phf -> rand 0.8) requires "js" feature on wasm32
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom02 = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true, features = ["full"] }
oxisql-core = { workspace = true, optional = true }
oxisql-sqlite-compat = { workspace = true, optional = true }
tracing-subscriber = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
