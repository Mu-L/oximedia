[package]
name = "oximedia-mir"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Music Information Retrieval (MIR) system for OxiMedia"
readme = "README.md"

[lints]
workspace = true

[features]
default = ["all"]
all = ["tempo", "beat", "key", "chord", "melody", "structure", "genre", "mood", "spectral", "rhythm", "harmonic"]
tempo = []
beat = []
key = []
chord = []
melody = []
structure = []
genre = []
mood = []
spectral = []
rhythm = []
harmonic = []

[dependencies]
oximedia-core = { workspace = true }
oximedia-audio = { workspace = true }
thiserror = { workspace = true }
rustfft = "6"
ndarray = { workspace = true }
serde = { workspace = true, features = ["derive"] }
bitflags = { workspace = true }

[dev-dependencies]
