[package]
name = "oximedia-videoip"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Professional video-over-IP protocol for OxiMedia (patent-free NDI alternative)"
keywords = ["streaming", "multimedia", "network", "video", "hls"]
categories = ["multimedia", "network-programming"]
readme = "README.md"

[lints]
workspace = true

[dependencies]
# Workspace dependencies
oximedia-core = { workspace = true }
oximedia-codec = { workspace = true, default-features = true }
oximedia-net = { workspace = true }
oximedia-monitor = { workspace = true }
oximedia-timecode = { workspace = true }
tokio = { workspace = true, features = ["full"] }
thiserror = { workspace = true }
bytes = { workspace = true }
bitflags = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
chrono = { workspace = true }
parking_lot = { workspace = true }
dashmap = { workspace = true }

# Networking
socket2 = "0.6"

# mDNS/DNS-SD for service discovery
mdns-sd = { workspace = true }

# Forward Error Correction
reed-solomon-erasure = "6.0"

# Compression (optional, for compressed video formats)
oxiarc-deflate = { workspace = true }

# Performance
crossbeam = "0.8"
flume = "0.12"

# Scatter/gather I/O — libc only used on Linux (cfg-gated in source)
libc = { workspace = true }

# QUIC transport (optional, feature-gated)
# Note: quinn 0.11 requires ring or aws-lc-rs for crypto (C dependencies).
# Per Pure Rust policy, these are acceptable only inside feature-gated code.
# The quic-quinn feature enables this — default features remain 100% pure Rust.
quinn = { workspace = true, features = ["rustls-ring"], optional = true }
rcgen = { workspace = true, optional = true }
rustls = { workspace = true, optional = true }
rustls-pemfile = { workspace = true, optional = true }

[dev-dependencies]
tokio-test = "0.4"
tempfile.workspace = true
criterion = { workspace = true }

[features]
default = []
hw-accel = []
# Enable real QUIC transport via quinn (pure Rust, requires rustls-rustcrypto)
quic-quinn = ["dep:quinn", "dep:rcgen", "dep:rustls", "dep:rustls-pemfile"]
