[package]
name = "oximedia-playout"
version.workspace = true
edition = "2021"
authors = ["OxiMedia Team"]
description = "Professional broadcast playout server for OxiMedia"
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
keywords = ["broadcast", "playout", "media", "video", "streaming"]
categories = ["multimedia", "network-programming"]

[lints]
workspace = true

[dependencies]
tokio = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
parking_lot = { workspace = true }
dashmap = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tokio-test = "0.4"
tracing-subscriber = "0.3"

[lib]
name = "oximedia_playout"
path = "src/lib.rs"

[features]
default = []
decklink = []
ndi = []
