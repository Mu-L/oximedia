[package]
name = "oximedia-web-scopes"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Real-time waveform, vectorscope, histogram and false-colour video scopes compiled to WebAssembly"
keywords = ["multimedia", "video", "wasm", "scopes", "waveform"]
categories = ["multimedia::video", "wasm", "visualization"]
publish = false

# Speed-tuned wasm-opt: the per-frame scatter/normalise kernels need -O3's
# loop optimisations; the module stays under its 150 KiB gzip soft budget.
[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O3", "--strip-debug"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
oximedia-web-core = { path = "../oximedia-web-core" }
wasm-bindgen.workspace = true
js-sys.workspace = true
# web-sys.workspace = true
