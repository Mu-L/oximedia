[package]
name = "oximedia-web-quality"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "PSNR and SSIM video quality metrics compiled to WebAssembly"
keywords = ["multimedia", "video", "wasm", "quality", "psnr"]
categories = ["multimedia::video", "wasm", "algorithms"]
publish = false

# Speed-tuned wasm-opt: the SSIM separable window passes need -O3's loop
# optimisations; the module stays under its 200 KiB gzip soft budget.
[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O3", "--strip-debug"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
oximedia-web-core = { path = "../oximedia-web-core" }
wasm-bindgen.workspace = true
js-sys.workspace = true
# web-sys.workspace = true
